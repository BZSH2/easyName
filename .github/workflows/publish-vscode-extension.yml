name: Publish VSCode Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publishToMarketplace:
        description: 'Publish to Visual Studio Marketplace'
        required: true
        default: true
        type: boolean
      publishToOpenVsx:
        description: 'Publish to Open VSX'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-vscode-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate project
        run: pnpm run lint && pnpm run typecheck && pnpm run compile

      - name: Build VSIX artifact
        run: pnpm dlx @vscode/vsce package --out easyName-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyName-vsix
          path: '*.vsix'
          if-no-files-found: error

      - name: Publish to Visual Studio Marketplace
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.publishToMarketplace)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm dlx @vscode/vsce publish --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.publishToOpenVsx) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && secrets.EASYNAMETOKEN != '')
        env:
          OVSX_PAT: ${{ secrets.EASYNAMETOKEN }}
        run: pnpm dlx ovsx publish -p "$OVSX_PAT"
